<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速測試 T004 API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .result {
            margin-top: 30px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 12px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        .big-number {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }

        .question-card {
            background: white;
            border: 3px solid #e74c3c;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .question-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: #e74c3c;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-left: 10px;
        }

        .subject-tag {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .error-badge {
            background: #e74c3c;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
        }

        .question-text {
            font-size: 16px;
            line-height: 1.6;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin: 15px 10px;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 10px;
            margin-bottom: 15px;
        }

        .answer-box {
            padding: 15px;
            border-radius: 8px;
            border: 2px solid;
        }

        .answer-box.correct {
            background: #f0fff4;
            border-color: #27ae60;
        }

        .answer-box.wrong {
            background: #fff5f5;
            border-color: #e74c3c;
        }

        .answer-label {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #666;
        }

        .answer-value {
            font-size: 15px;
            color: #333;
        }

        .distribution {
            background: #fff5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 0 10px;
        }

        .distribution h4 {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .dist-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #ffe6e6;
        }

        .dist-item:last-child {
            border-bottom: none;
        }

        .dist-count {
            background: #e74c3c;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f5576c;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fadbd8;
            color: #e74c3c;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎯 T004 快速測試</h1>
            <p class="subtitle">錯誤選項分析 API - 自動測試指定用戶</p>

            <div class="user-info">
                <strong>測試用戶 ID:</strong><br>
                68b72a80-57d8-40ee-811e-be58bea1e69f
            </div>

            <button id="btn5">🚀 執行測試（顯示前 5 題）</button>
            <button id="btn10" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">📊 執行測試（顯示前 10 題）</button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>載入中，請稍候...</p>
            </div>

            <div class="error" id="error"></div>

            <div class="result" id="result">
                <div class="summary">
                    <h3>找到常錯題目</h3>
                    <div class="big-number" id="count">0</div>
                    <p>個題目需要特別注意</p>
                </div>

                <div id="questionList"></div>

                <div id="empty" class="empty" style="display: none;">
                    <div class="icon">🎉</div>
                    <h3>太棒了！</h3>
                    <p>該用戶目前沒有錯誤記錄</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/api-service.js"></script>

    <script>
        const TEST_USER_ID = '68b72a80-57d8-40ee-811e-be58bea1e69f';
        const apiService = new ApiService();
        let initialized = false;

        // 自動初始化
        (async function() {
            const result = await apiService.initialize();
            if (result.success) {
                initialized = true;
                console.log('✅ API Service 初始化成功');
            } else {
                showError('API Service 初始化失敗: ' + (result.error || '未知錯誤'));
            }
        })();

        async function runTest(limit = 5) {
            if (!initialized) {
                showError('API Service 尚未初始化，請稍候重試');
                return;
            }

            hideError();
            hideResult();
            showLoading();

            try {
                console.log(`🔍 測試用戶: ${TEST_USER_ID}`);
                console.log(`📊 顯示題數: ${limit}`);

                const result = await apiService.getWrongAnswerPatterns(TEST_USER_ID, limit);

                hideLoading();

                if (result.success) {
                    console.log('✅ API 回傳成功:', result.data);
                    displayResults(result.data);
                } else {
                    showError('API 錯誤: ' + (result.error?.message || result.error || '未知錯誤'));
                }
            } catch (error) {
                hideLoading();
                showError('執行錯誤: ' + error.message);
                console.error(error);
            }
        }

        function displayResults(data) {
            const countEl = document.getElementById('count');
            const listEl = document.getElementById('questionList');
            const emptyEl = document.getElementById('empty');

            countEl.textContent = data.length;

            if (data.length === 0) {
                listEl.innerHTML = '';
                emptyEl.style.display = 'block';
            } else {
                emptyEl.style.display = 'none';
                listEl.innerHTML = data.map((item, index) => `
                    <div class="question-card">
                        <div class="question-header">
                            <span class="subject-tag">${esc(item.subject || '未分類')} - ${esc(item.chapter || '通用')}</span>
                            <span class="error-badge">錯誤 ${item.timesWrong} 次</span>
                        </div>

                        <div class="question-text">
                            <strong>Q${index + 1}:</strong> ${esc(item.question)}
                        </div>

                        <div class="answer-grid">
                            <div class="answer-box correct">
                                <div class="answer-label">✅ 正確答案</div>
                                <div class="answer-value">${formatAnswer(item.correctAnswer)}</div>
                            </div>
                            <div class="answer-box wrong">
                                <div class="answer-label">❌ 最常選錯</div>
                                <div class="answer-value">${formatAnswer(item.mostCommonWrongAnswer)}</div>
                            </div>
                        </div>

                        ${renderDistribution(item.wrongAnswerCounts)}
                    </div>
                `).join('');
            }

            document.getElementById('result').classList.add('show');
        }

        function renderDistribution(counts) {
            const entries = Object.entries(counts);
            if (entries.length === 0) return '';

            const items = entries
                .sort((a, b) => b[1] - a[1])
                .map(([ans, count]) => `
                    <div class="dist-item">
                        <span>${esc(ans)}</span>
                        <span class="dist-count">${count} 次</span>
                    </div>
                `).join('');

            return `
                <div class="distribution">
                    <h4>📊 錯誤選項分布</h4>
                    ${items}
                </div>
            `;
        }

        function formatAnswer(answer) {
            if (answer === null || answer === undefined) {
                return '<span style="color: #999;">無</span>';
            }
            if (Array.isArray(answer)) {
                return esc(answer.join(', '));
            }
            return esc(String(answer));
        }

        function esc(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading() {
            document.getElementById('loading').classList.add('show');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('show');
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = '❌ ' + msg;
            el.classList.add('show');
        }

        function hideError() {
            document.getElementById('error').classList.remove('show');
        }

        function hideResult() {
            document.getElementById('result').classList.remove('show');
        }

        // 綁定按鈕事件
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('btn5').addEventListener('click', () => runTest(5));
            document.getElementById('btn10').addEventListener('click', () => runTest(10));
        });
    </script>
</body>
</html>
