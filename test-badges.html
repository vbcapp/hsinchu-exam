<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T007 - 徽章系統測試</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .test-section {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .test-section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.5rem;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .test-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .test-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .test-button:active {
            transform: translateY(0);
        }

        .result-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-top: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }

        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .badge-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .badge-card:hover {
            transform: translateY(-4px);
        }

        .badge-card.locked {
            background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%);
            opacity: 0.7;
        }

        .badge-icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
        }

        .badge-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .badge-description {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .badge-progress {
            background: rgba(255,255,255,0.3);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .badge-progress-bar {
            background: white;
            height: 100%;
            transition: width 0.3s;
        }

        .badge-stats {
            font-size: 0.8rem;
            margin-top: 5px;
            opacity: 0.9;
        }

        .newly-unlocked {
            animation: pulse 1s infinite;
            border: 3px solid #fbbf24;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 4px 8px rgba(251, 191, 36, 0.4);
            }
            50% {
                box-shadow: 0 8px 16px rgba(251, 191, 36, 0.8);
            }
        }

        .success {
            color: #10b981;
            font-weight: bold;
        }

        .error {
            color: #ef4444;
            font-weight: bold;
        }

        .info {
            color: #667eea;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* Material Icons Support */
        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
    </style>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>🏆 T007 - 徽章系統測試</h1>

        <!-- Test 1: Check and Unlock Badges -->
        <div class="test-section">
            <h2>測試 1: 檢查並解鎖徽章</h2>
            <button class="test-button" onclick="testCheckAndUnlockBadges()">
                執行檢查（checkAndUnlockBadges）
            </button>
            <div id="test1-result" class="result-box" style="display: none;"></div>
            <div id="test1-badges" class="badge-grid"></div>
        </div>

        <!-- Test 2: Get User Badges -->
        <div class="test-section">
            <h2>測試 2: 取得已解鎖徽章</h2>
            <button class="test-button" onclick="testGetUserBadges()">
                取得徽章列表（getUserBadges）
            </button>
            <div id="test2-result" class="result-box" style="display: none;"></div>
            <div id="test2-badges" class="badge-grid"></div>
        </div>

        <!-- Test 3: Get Available Badges -->
        <div class="test-section">
            <h2>測試 3: 取得即將解鎖的徽章（進度 ≥ 50%）</h2>
            <button class="test-button" onclick="testGetAvailableBadges(50)">
                進度 ≥ 50%
            </button>
            <button class="test-button" onclick="testGetAvailableBadges(80)">
                進度 ≥ 80%
            </button>
            <button class="test-button" onclick="testGetAvailableBadges(0)">
                顯示全部未解鎖
            </button>
            <div id="test3-result" class="result-box" style="display: none;"></div>
            <div id="test3-badges" class="badge-grid"></div>
        </div>

        <!-- Test 4: User Stats -->
        <div class="test-section">
            <h2>測試 4: 用戶統計數據</h2>
            <button class="test-button" onclick="testUserStats()">
                取得統計數據
            </button>
            <div id="test4-stats" class="stats-grid"></div>
        </div>

        <!-- Test 5: Comprehensive Test -->
        <div class="test-section">
            <h2>測試 5: 完整測試（全部 API）</h2>
            <button class="test-button" onclick="runComprehensiveTest()">
                執行完整測試
            </button>
            <div id="test5-result" class="result-box" style="display: none;"></div>
        </div>
    </div>

    <script src="config/supabase-config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api-service.js"></script>

    <script>
        const api = new ApiService();
        let currentUserId = null;

        // 初始化
        async function init() {
            const result = await api.initialize();
            if (result.success && result.user) {
                currentUserId = result.user.id;
                console.log('✅ 已登入，用戶 ID:', currentUserId);
            } else {
                alert('❌ 未登入，請先登入系統');
            }
        }

        // 測試 1: checkAndUnlockBadges
        async function testCheckAndUnlockBadges() {
            const resultBox = document.getElementById('test1-result');
            const badgesContainer = document.getElementById('test1-badges');
            resultBox.style.display = 'block';
            resultBox.innerHTML = '⏳ 檢查徽章解鎖條件中...';
            badgesContainer.innerHTML = '';

            try {
                const result = await api.checkAndUnlockBadges(currentUserId);

                if (result.success) {
                    const { newlyUnlocked, totalChecked, totalUnlocked } = result.data;

                    let output = `✅ 檢查完成！\n\n`;
                    output += `📊 檢查了 ${totalChecked} 個徽章條件\n`;
                    output += `🏆 目前已解鎖 ${totalUnlocked} 個徽章\n`;
                    output += `🎉 本次新解鎖 ${newlyUnlocked.length} 個徽章\n\n`;

                    if (newlyUnlocked.length > 0) {
                        output += `新解鎖的徽章：\n`;
                        newlyUnlocked.forEach((badge, index) => {
                            output += `${index + 1}. ${badge.badgeName} (${badge.badgeKey})\n`;
                            output += `   描述: ${badge.badgeDescription}\n`;
                            output += `   解鎖時間: ${new Date(badge.unlockedAt).toLocaleString('zh-TW')}\n\n`;
                        });

                        // 顯示新解鎖的徽章卡片
                        newlyUnlocked.forEach(badge => {
                            const card = createBadgeCard(badge, true);
                            badgesContainer.appendChild(card);
                        });
                    } else {
                        output += `目前沒有新解鎖的徽章，繼續努力！💪`;
                    }

                    resultBox.innerHTML = output;
                } else {
                    resultBox.innerHTML = `❌ 錯誤: ${result.error}`;
                }
            } catch (error) {
                resultBox.innerHTML = `❌ 執行失敗: ${error.message}`;
            }
        }

        // 測試 2: getUserBadges
        async function testGetUserBadges() {
            const resultBox = document.getElementById('test2-result');
            const badgesContainer = document.getElementById('test2-badges');
            resultBox.style.display = 'block';
            resultBox.innerHTML = '⏳ 載入徽章列表...';
            badgesContainer.innerHTML = '';

            try {
                const result = await api.getUserBadges(currentUserId);

                if (result.success) {
                    const badges = result.data;
                    let output = `✅ 已解鎖 ${result.total} 個徽章\n\n`;

                    if (badges.length > 0) {
                        badges.forEach((badge, index) => {
                            output += `${index + 1}. ${badge.badge_name} (${badge.badge_key})\n`;
                            output += `   描述: ${badge.badge_description || '無'}\n`;
                            output += `   解鎖時間: ${new Date(badge.unlocked_at).toLocaleString('zh-TW')}\n\n`;

                            // 顯示徽章卡片
                            const card = createBadgeCard({
                                badgeKey: badge.badge_key,
                                badgeName: badge.badge_name,
                                badgeDescription: badge.badge_description,
                                badgeIcon: badge.badge_icon,
                                unlockedAt: badge.unlocked_at
                            }, false);
                            badgesContainer.appendChild(card);
                        });
                    } else {
                        output += `尚未解鎖任何徽章，開始答題來獲得第一個徽章吧！🎯`;
                    }

                    resultBox.innerHTML = output;
                } else {
                    resultBox.innerHTML = `❌ 錯誤: ${result.error}`;
                }
            } catch (error) {
                resultBox.innerHTML = `❌ 執行失敗: ${error.message}`;
            }
        }

        // 測試 3: getAvailableBadges
        async function testGetAvailableBadges(minProgress) {
            const resultBox = document.getElementById('test3-result');
            const badgesContainer = document.getElementById('test3-badges');
            resultBox.style.display = 'block';
            resultBox.innerHTML = `⏳ 計算徽章進度（最小進度 ≥ ${minProgress}%）...`;
            badgesContainer.innerHTML = '';

            try {
                const result = await api.getAvailableBadges(currentUserId, minProgress);

                if (result.success) {
                    const badges = result.data;
                    let output = `✅ 找到 ${badges.length} 個即將解鎖的徽章\n\n`;

                    if (badges.length > 0) {
                        badges.forEach((badge, index) => {
                            output += `${index + 1}. ${badge.badgeName} (${badge.badgeKey})\n`;
                            output += `   類別: ${badge.category}\n`;
                            output += `   進度: ${badge.progress}% (${badge.current}/${badge.target})\n`;
                            output += `   還需: ${badge.remaining}\n\n`;

                            // 顯示徽章卡片（帶進度條）
                            const card = createBadgeCard(badge, false, true);
                            badgesContainer.appendChild(card);
                        });
                    } else {
                        output += `沒有符合條件的徽章（進度 ≥ ${minProgress}%）`;
                    }

                    resultBox.innerHTML = output;
                } else {
                    resultBox.innerHTML = `❌ 錯誤: ${result.error}`;
                }
            } catch (error) {
                resultBox.innerHTML = `❌ 執行失敗: ${error.message}`;
            }
        }

        // 測試 4: 用戶統計
        async function testUserStats() {
            const statsContainer = document.getElementById('test4-stats');
            statsContainer.innerHTML = '⏳ 載入統計數據...';

            try {
                // 取得各項統計
                const [totalCorrect, masteredCount, badgesCount] = await Promise.all([
                    api.supabase.from('answer_records')
                        .select('id', { count: 'exact', head: true })
                        .eq('user_id', currentUserId)
                        .eq('is_correct', true),
                    api.supabase.from('user_question_progress')
                        .select('id', { count: 'exact', head: true })
                        .eq('user_id', currentUserId)
                        .gte('times_correct', 3),
                    api.supabase.from('user_badges')
                        .select('id', { count: 'exact', head: true })
                        .eq('user_id', currentUserId)
                ]);

                // 計算連勝
                const { data: recentAnswers } = await api.supabase
                    .from('answer_records')
                    .select('is_correct')
                    .eq('user_id', currentUserId)
                    .order('created_at', { ascending: false })
                    .limit(100);

                let maxStreak = 0;
                let currentStreak = 0;
                if (recentAnswers) {
                    for (const record of recentAnswers) {
                        if (record.is_correct) {
                            currentStreak++;
                            maxStreak = Math.max(maxStreak, currentStreak);
                        } else {
                            break; // 只計算當前連勝
                        }
                    }
                }

                statsContainer.innerHTML = `
                    <div class="stat-card">
                        <div class="stat-value">${totalCorrect.count || 0}</div>
                        <div class="stat-label">累積答對</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${masteredCount.count || 0}</div>
                        <div class="stat-label">熟練題數</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${currentStreak}</div>
                        <div class="stat-label">當前連勝</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value">${badgesCount.count || 0}</div>
                        <div class="stat-label">已解鎖徽章</div>
                    </div>
                `;
            } catch (error) {
                statsContainer.innerHTML = `❌ 載入失敗: ${error.message}`;
            }
        }

        // 測試 5: 完整測試
        async function runComprehensiveTest() {
            const resultBox = document.getElementById('test5-result');
            resultBox.style.display = 'block';
            resultBox.innerHTML = '⏳ 執行完整測試...\n\n';

            try {
                // Test 1: Check and unlock
                resultBox.innerHTML += '📋 測試 1: 檢查並解鎖徽章...\n';
                const checkResult = await api.checkAndUnlockBadges(currentUserId);
                if (checkResult.success) {
                    resultBox.innerHTML += `✅ 通過！新解鎖 ${checkResult.data.newlyUnlocked.length} 個徽章\n\n`;
                } else {
                    resultBox.innerHTML += `❌ 失敗: ${checkResult.error}\n\n`;
                }

                // Test 2: Get user badges
                resultBox.innerHTML += '📋 測試 2: 取得已解鎖徽章...\n';
                const getUserResult = await api.getUserBadges(currentUserId);
                if (getUserResult.success) {
                    resultBox.innerHTML += `✅ 通過！共有 ${getUserResult.total} 個徽章\n\n`;
                } else {
                    resultBox.innerHTML += `❌ 失敗: ${getUserResult.error}\n\n`;
                }

                // Test 3: Get available badges
                resultBox.innerHTML += '📋 測試 3: 取得即將解鎖的徽章...\n';
                const availableResult = await api.getAvailableBadges(currentUserId, 50);
                if (availableResult.success) {
                    resultBox.innerHTML += `✅ 通過！找到 ${availableResult.data.length} 個即將解鎖的徽章\n\n`;
                } else {
                    resultBox.innerHTML += `❌ 失敗: ${availableResult.error}\n\n`;
                }

                resultBox.innerHTML += '\n🎉 所有測試完成！';
            } catch (error) {
                resultBox.innerHTML += `\n❌ 測試中斷: ${error.message}`;
            }
        }

        // 輔助函數: 建立徽章卡片
        function createBadgeCard(badge, isNewlyUnlocked = false, showProgress = false) {
            const card = document.createElement('div');
            card.className = 'badge-card';
            if (isNewlyUnlocked) {
                card.classList.add('newly-unlocked');
            }
            if (showProgress) {
                card.classList.add('locked');
            }

            const iconMap = {
                'flag': '🚩',
                'stars': '⭐',
                'emoji_events': '🏆',
                'military_tech': '🎖️',
                'local_fire_department': '🔥',
                'whatshot': '💥',
                'bolt': '⚡',
                'calendar_today': '📅',
                'event_available': '✅',
                'verified': '✔️',
                'school': '🎓',
                'workspace_premium': '👑',
                'star': '⭐',
                'speed': '⚡'
            };

            const icon = iconMap[badge.badgeIcon] || '🏅';

            let html = `
                <span class="badge-icon">${icon}</span>
                <div class="badge-name">${badge.badgeName}</div>
                <div class="badge-description">${badge.badgeDescription}</div>
            `;

            if (showProgress && badge.progress !== undefined) {
                html += `
                    <div class="badge-progress">
                        <div class="badge-progress-bar" style="width: ${badge.progress}%"></div>
                    </div>
                    <div class="badge-stats">
                        ${badge.progress}% - ${badge.current} / ${badge.target}
                        ${badge.remaining > 0 ? `(還需 ${badge.remaining})` : ''}
                    </div>
                `;
            } else if (badge.unlockedAt) {
                html += `
                    <div class="badge-stats">
                        解鎖於 ${new Date(badge.unlockedAt).toLocaleDateString('zh-TW')}
                    </div>
                `;
            }

            card.innerHTML = html;
            return card;
        }

        // 頁面載入時初始化
        init();
    </script>
</body>
</html>
