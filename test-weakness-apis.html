<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測試弱點分析 API (T002-T004)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="js/api-service.js"></script>
    <style>
        .api-card {
            border: 2px solid #000;
            box-shadow: 4px 4px 0 0 #000;
        }
        .success { background-color: #D1FAE5; }
        .error { background-color: #FEE2E2; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black mb-6">弱點分析 API 測試 (T002-T004)</h1>

        <div id="status" class="api-card p-4 mb-6 bg-yellow-100">
            <p class="font-bold">🔄 初始化中...</p>
        </div>

        <!-- T002: 今日新增熟練題數 -->
        <div class="api-card bg-white p-6 mb-6">
            <h2 class="text-xl font-black mb-3">📊 T002: 今日新增熟練題數</h2>
            <button onclick="testT002()" class="bg-blue-500 text-white px-4 py-2 font-bold hover:bg-blue-600">
                測試 getTodayMasteredCount
            </button>
            <pre id="t002-result" class="mt-4 p-4 bg-gray-50 text-xs overflow-auto max-h-60"></pre>
        </div>

        <!-- T003: 本次 vs 歷史正確率 -->
        <div class="api-card bg-white p-6 mb-6">
            <h2 class="text-xl font-black mb-3">📈 T003: 本次 vs 歷史正確率</h2>
            <button onclick="testT003()" class="bg-green-500 text-white px-4 py-2 font-bold hover:bg-green-600">
                測試 getRecentVsHistoricalAccuracy
            </button>
            <pre id="t003-result" class="mt-4 p-4 bg-gray-50 text-xs overflow-auto max-h-60"></pre>
        </div>

        <!-- T004: 錯誤選項分析 -->
        <div class="api-card bg-white p-6 mb-6">
            <h2 class="text-xl font-black mb-3">🎯 T004: 錯誤選項分析</h2>
            <button onclick="testT004()" class="bg-red-500 text-white px-4 py-2 font-bold hover:bg-red-600">
                測試 getWrongAnswerPatterns
            </button>
            <pre id="t004-result" class="mt-4 p-4 bg-gray-50 text-xs overflow-auto max-h-60"></pre>
        </div>

        <!-- 全部測試 -->
        <div class="api-card bg-white p-6">
            <button onclick="testAll()" class="bg-purple-500 text-white px-6 py-3 font-black hover:bg-purple-600">
                🚀 測試全部 API
            </button>
        </div>
    </div>

    <script>
        let currentUserId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const statusEl = document.getElementById('status');
            try {
                await apiService.initialize();
                if (!apiService.currentUser) {
                    statusEl.innerHTML = '<p class="font-bold text-red-600">❌ 未登入，請先登入系統</p>';
                    statusEl.className = 'api-card p-4 mb-6 error';
                    return;
                }
                currentUserId = apiService.currentUser.id;
                statusEl.innerHTML = `<p class="font-bold text-green-600">✅ 已登入：${apiService.currentUser.username} (${currentUserId})</p>`;
                statusEl.className = 'api-card p-4 mb-6 success';
            } catch (error) {
                statusEl.innerHTML = `<p class="font-bold text-red-600">❌ 初始化失敗：${error.message}</p>`;
                statusEl.className = 'api-card p-4 mb-6 error';
            }
        });

        async function testT002() {
            const resultEl = document.getElementById('t002-result');
            resultEl.textContent = '測試中...';
            try {
                const result = await apiService.getTodayMasteredCount(currentUserId);
                resultEl.textContent = JSON.stringify(result, null, 2);
                resultEl.parentElement.classList.add('success');
            } catch (error) {
                resultEl.textContent = '錯誤：' + error.message;
                resultEl.parentElement.classList.add('error');
            }
        }

        async function testT003() {
            const resultEl = document.getElementById('t003-result');
            resultEl.textContent = '測試中...';
            try {
                const result = await apiService.getRecentVsHistoricalAccuracy(currentUserId, 10);
                resultEl.textContent = JSON.stringify(result, null, 2);
                resultEl.parentElement.classList.add('success');
            } catch (error) {
                resultEl.textContent = '錯誤：' + error.message;
                resultEl.parentElement.classList.add('error');
            }
        }

        async function testT004() {
            const resultEl = document.getElementById('t004-result');
            resultEl.textContent = '測試中...';
            try {
                const result = await apiService.getWrongAnswerPatterns(currentUserId, 5);
                resultEl.textContent = JSON.stringify(result, null, 2);
                resultEl.parentElement.classList.add('success');
            } catch (error) {
                resultEl.textContent = '錯誤：' + error.message;
                resultEl.parentElement.classList.add('error');
            }
        }

        async function testAll() {
            await testT002();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testT003();
            await new Promise(resolve => setTimeout(resolve, 500));
            await testT004();
        }
    </script>
</body>
</html>
