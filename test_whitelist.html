<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitelist Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <script src="config.js"></script>
    <script src="js/modal-system.js"></script>
</head>

<body class="p-10">
    <h1 class="text-2xl font-bold mb-4">Whitelist Logic Test</h1>

    <div class="mb-4">
        <label>Test Email:</label>
        <input type="email" id="test-email" value="test@example.com" class="border p-2">
    </div>

    <button onclick="testWhitelist()" class="bg-blue-500 text-white px-4 py-2 rounded">Test Login</button>

    <script>
        function testWhitelist() {
            const email = document.getElementById('test-email').value;
            console.log('Testing email:', email);
            console.log('Student Emails:', typeof STUDENT_EMAILS !== 'undefined' ? STUDENT_EMAILS : 'Undefined');

            if (typeof STUDENT_EMAILS !== 'undefined' && Array.isArray(STUDENT_EMAILS)) {
                const isWhitelisted = STUDENT_EMAILS.includes(email);
                console.log('Is Whitelisted:', isWhitelisted);

                if (!isWhitelisted) {
                    console.log('Triggering Alert...');
                    ModalSystem.alert('存取被拒', '您目前電子郵箱未在名單中，若有問題可聯係 ceceloveye@gmail.com');
                } else {
                    alert('Allowed!');
                }
            } else {
                alert('STUDENT_EMAILS not loaded!');
            }
        }
    </script>
</body>

</html>
