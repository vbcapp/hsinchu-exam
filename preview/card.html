<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業證照考試系統 - 答題預覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFD400',
                        bglight: '#F7F7F7',
                        bgdark: '#1A1A1A',
                        'correct-green': '#F0FDF4',
                        'correct-border': '#22C55E',
                        'correct-text': '#166534',
                        'incorrect-red': '#FEF2F2',
                        'incorrect-border': '#EF4444',
                        'incorrect-text': '#991B1B',
                    },
                    boxShadow: {
                        'brutal': '4px 4px 0px rgba(0,0,0,1)',
                        'brutal-sm': '2px 2px 0px rgba(0,0,0,1)',
                        'brutal-hover': '6px 6px 0px rgba(0,0,0,1)',
                    },
                    fontFamily: {
                        sans: ['"Space Grotesk"', '"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif;
            background-color: #F7F7F7;
        }

        .brutal-border {
            border: 3px solid #1A1A1A;
        }

        /* 隱藏原生 checkbox/radio */
        .option-input:checked+div {
            background-color: #FFD400;
        }

        /* 答對、答錯的樣式展示 */
        .correct-answer {
            background-color: theme('colors.correct-green') !important;
            border-color: theme('colors.correct-border') !important;
        }

        .correct-answer span.option-letter {
            background-color: theme('colors.correct-border');
            color: white;
        }

        .correct-answer span.option-text {
            color: theme('colors.correct-text');
        }

        .wrong-answer {
            background-color: theme('colors.incorrect-red') !important;
            border-color: theme('colors.incorrect-border') !important;
        }

        .wrong-answer span.option-letter {
            background-color: theme('colors.incorrect-border');
            color: white;
        }

        .wrong-answer span.option-text {
            color: theme('colors.incorrect-text');
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="text-gray-900 min-h-screen flex justify-center bg-zinc-200">

    <!-- 模擬手機大小的容器 (如 RWD 設計，在大螢幕置中，小螢幕滿版) -->
    <div
        class="w-full max-w-[430px] bg-white min-h-screen flex flex-col brutal-border relative shadow-[8px_8px_0px_rgba(0,0,0,0.1)]">

        <!-- 頂部導航 (精簡) -->
        <header class="w-full flex justify-between items-center p-4 border-b-4 border-black bg-white z-10 sticky top-0">
            <button
                class="w-10 h-10 flex items-center justify-center brutal-border bg-white shadow-brutal active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="px-3 py-1.5 brutal-border bg-primary shadow-brutal font-bold text-sm">
                小測驗
            </div>
            <div class="w-10"></div> <!-- 佔位符保持置中 -->
        </header>

        <!-- 卡片本體 (可滾動區塊) -->
        <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-24 no-scrollbar">
            <!-- 標籤：大科目 & 章節 -->
            <div class="flex flex-wrap gap-2 mb-4 text-xs font-bold uppercase">
                <span class="px-2 py-1 bg-black text-white brutal-border border-black">職業安全衛生管理</span>
                <span class="px-2 py-1 bg-white text-black brutal-border">第1章</span>
                <span class="px-2 py-1 bg-purple-100 text-purple-900 brutal-border ml-auto">單選題</span>
            </div>

            <!-- 題目內容區塊 -->
            <div class="mb-6 bg-white brutal-border shadow-brutal p-5 rounded-2xl">
                <h2 class="text-lg md:text-xl font-bold leading-relaxed">
                    依職業安全衛生法規定，平時僱用勞工總人數在多少人以上之事業單位，應設職業安全衛生管理單位？
                </h2>
            </div>

            <!-- 選項列表 -->
            <div class="space-y-3 mb-8">
                <!-- 選項 A -->
                <label class="block cursor-pointer relative group">
                    <input type="radio" name="answer" class="peer sr-only option-input">
                    <div
                        class="w-full p-3 md:p-4 brutal-border bg-white rounded-xl shadow-brutal-sm group-hover:shadow-brutal transition-all flex items-center peer-checked:bg-primary">
                        <span
                            class="option-letter w-8 h-8 rounded-full flex items-center justify-center brutal-border bg-white mr-3 font-bold text-sm peer-checked:bg-black peer-checked:text-white transition-colors">A</span>
                        <span class="option-text font-bold text-base md:text-lg">50人</span>
                    </div>
                </label>

                <!-- 選項 B (答錯情境) -->
                <label class="block cursor-not-allowed relative group">
                    <input type="radio" name="answer" class="peer sr-only option-input" disabled checked>
                    <div
                        class="w-full p-3 md:p-4 brutal-border wrong-answer rounded-xl shadow-brutal-sm flex items-center">
                        <span
                            class="option-letter w-8 h-8 rounded-full flex items-center justify-center brutal-border mr-3 font-bold text-sm">B</span>
                        <span class="option-text font-bold text-base md:text-lg">100人</span>
                        <span
                            class="material-symbols-outlined ml-auto text-incorrect-border font-bold text-xl">close</span>
                    </div>
                </label>

                <!-- 選項 C (正確答案) -->
                <label class="block cursor-not-allowed relative group">
                    <input type="radio" name="answer" class="peer sr-only option-input" disabled>
                    <div
                        class="w-full p-3 md:p-4 brutal-border correct-answer rounded-xl shadow-brutal-sm flex items-center">
                        <span
                            class="option-letter w-8 h-8 rounded-full flex items-center justify-center brutal-border mr-3 font-bold text-sm">C</span>
                        <span class="option-text font-bold text-base md:text-lg">300人</span>
                        <span
                            class="material-symbols-outlined ml-auto text-correct-border font-bold text-xl">check</span>
                    </div>
                </label>

                <!-- 選項 D -->
                <label class="block cursor-pointer relative group">
                    <input type="radio" name="answer" class="peer sr-only option-input">
                    <div
                        class="w-full p-3 md:p-4 brutal-border bg-white rounded-xl shadow-brutal-sm group-hover:shadow-brutal transition-all flex items-center peer-checked:bg-primary">
                        <span
                            class="option-letter w-8 h-8 rounded-full flex items-center justify-center brutal-border bg-white mr-3 font-bold text-sm peer-checked:bg-black peer-checked:text-white transition-colors">D</span>
                        <span class="option-text font-bold text-base md:text-lg">500人</span>
                    </div>
                </label>
            </div>

            <!-- 解答解析區塊 (預設隱藏，答題後顯示) -->
            <div class="mb-4 bg-yellow-50 brutal-border relative rounded-2xl border-dashed border-gray-400 p-4">
                <div class="flex items-center gap-2 mb-2">
                    <span class="text-base">💡</span>
                    <span class="font-black text-base text-gray-800">答案解析：</span>
                </div>
                <p class="text-gray-700 font-medium leading-relaxed text-sm md:text-base">
                    依據職業安全衛生管理辦法第2-1條規定：第一類事業單位平時僱用勞工總人數在三百人以上者，應設直接隸屬雇主之專責一級職業安全衛生管理單位。
                </p>
            </div>
        </main>

        <!-- 底部按鈕區 (固定在底部) -->
        <div class="absolute bottom-0 left-0 right-0 p-4 bg-white border-t-4 border-black z-20 flex gap-3">
            <!-- 作答時顯示這個
            <button class="w-full py-4 rounded-xl bg-primary brutal-border shadow-brutal text-center font-bold text-lg active:translate-y-1 active:translate-x-1 active:shadow-none transition-all">
                送出答案
            </button>
            -->

            <!-- 送出後顯示這個 -->
            <button
                class="flex-1 py-3 md:py-4 rounded-xl bg-white brutal-border shadow-neo text-center font-bold text-base md:text-lg active:translate-y-1 active:translate-x-1 active:shadow-none transition-all flex justify-center items-center gap-2">
                <span class="text-incorrect-border material-symbols-outlined font-bold">close</span> 返回
            </button>
            <button
                class="flex-[2] py-3 md:py-4 rounded-xl bg-primary brutal-border shadow-brutal text-center font-bold text-base md:text-lg active:translate-y-1 active:translate-x-1 active:shadow-none transition-all flex justify-center items-center gap-2">
                繼續測驗 <span class="material-symbols-outlined">arrow_forward</span>
            </button>
        </div>
    </div>
</body>

</html>
