<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T005 - 答題時段效率分析 API 測試</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .status {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #28a745;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #dc3545;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .data-display {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            overflow-x: auto;
        }

        .data-display pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .summary-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .summary-item .label {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .summary-item .value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .hourly-chart {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .hour-block {
            background: #f0f0f0;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            transition: all 0.3s;
        }

        .hour-block.best {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            font-weight: bold;
        }

        .hour-block.worst {
            background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
            color: white;
            font-weight: bold;
        }

        .hour-block .hour-label {
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .hour-block .accuracy {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .hour-block .count {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .recommendation {
            background: linear-gradient(135deg, #17a2b8 0%, #138496 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .test-section {
            margin-top: 30px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🕐 T005 - 答題時段效率分析 API 測試</h1>

        <!-- API 測試區 -->
        <div class="card">
            <h2>📊 API 測試</h2>
            <div id="status" class="status loading">等待測試...</div>

            <button onclick="testCurrentUser()">測試當前用戶</button>
            <button onclick="testNewUser()">測試新用戶（無數據）</button>
            <button onclick="testCustomUser()">測試自訂用戶</button>

            <div class="input-group" style="margin-top: 20px;">
                <label>自訂用戶 ID：</label>
                <input type="text" id="customUserId" placeholder="請輸入用戶 ID（UUID 格式）">
            </div>

            <div id="rawData" class="data-display" style="display:none;">
                <strong>原始回傳資料：</strong>
                <pre id="rawDataContent"></pre>
            </div>
        </div>

        <!-- 摘要統計 -->
        <div class="card" id="summaryCard" style="display:none;">
            <h2>📈 統計摘要</h2>
            <div class="summary-grid" id="summaryGrid"></div>
            <div class="recommendation" id="recommendation"></div>
        </div>

        <!-- 時段效率圖表 -->
        <div class="card" id="chartCard" style="display:none;">
            <h2>⏰ 各時段答題效率</h2>
            <div class="hourly-chart" id="hourlyChart"></div>
        </div>

        <!-- 測試案例 -->
        <div class="card test-section">
            <h2>✅ 測試檢查清單</h2>
            <div id="testChecklist">
                <label><input type="checkbox" id="test1"> 有充足數據（每個時段 > 10 題）</label><br>
                <label><input type="checkbox" id="test2"> 數據稀少（某些時段無答題）</label><br>
                <label><input type="checkbox" id="test3"> 新用戶（無答題記錄）</label><br>
                <label><input type="checkbox" id="test4"> 能正確識別最佳/最差時段</label><br>
                <label><input type="checkbox" id="test5"> 建議文字正確生成</label><br>
            </div>
        </div>
    </div>

    <script type="module">
        import ApiService from './js/api-service.js';

        const apiService = new ApiService();
        window.apiService = apiService;

        // 更新狀態顯示
        function updateStatus(message, type = 'loading') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        // 顯示原始資料
        function showRawData(data) {
            document.getElementById('rawData').style.display = 'block';
            document.getElementById('rawDataContent').textContent = JSON.stringify(data, null, 2);
        }

        // 顯示摘要統計
        function showSummary(data) {
            const summaryCard = document.getElementById('summaryCard');
            const summaryGrid = document.getElementById('summaryGrid');
            const recommendation = document.getElementById('recommendation');

            summaryCard.style.display = 'block';

            // 計算總答題數
            const totalAnswers = data.hourlyStats.reduce((sum, s) => sum + s.total, 0);
            const totalCorrect = data.hourlyStats.reduce((sum, s) => sum + s.correct, 0);
            const overallAccuracy = totalAnswers > 0 ? Math.round((totalCorrect / totalAnswers) * 100) : 0;

            summaryGrid.innerHTML = `
                <div class="summary-item">
                    <div class="label">總答題數</div>
                    <div class="value">${totalAnswers}</div>
                </div>
                <div class="summary-item">
                    <div class="label">整體正確率</div>
                    <div class="value">${overallAccuracy}%</div>
                </div>
                <div class="summary-item">
                    <div class="label">最佳時段</div>
                    <div class="value">${data.bestHour !== null ? `${data.bestHour}:00` : '---'}</div>
                </div>
                <div class="summary-item">
                    <div class="label">最高正確率</div>
                    <div class="value">${data.bestAccuracy}%</div>
                </div>
                <div class="summary-item">
                    <div class="label">最差時段</div>
                    <div class="value">${data.worstHour !== null ? `${data.worstHour}:00` : '---'}</div>
                </div>
                <div class="summary-item">
                    <div class="label">最低正確率</div>
                    <div class="value">${data.worstAccuracy}%</div>
                </div>
            `;

            recommendation.textContent = `💡 ${data.recommendation}`;
        }

        // 顯示時段效率圖表
        function showChart(data) {
            const chartCard = document.getElementById('chartCard');
            const hourlyChart = document.getElementById('hourlyChart');

            chartCard.style.display = 'block';

            if (data.hourlyStats.length === 0) {
                hourlyChart.innerHTML = '<p style="text-align:center; padding:20px;">目前無答題記錄</p>';
                return;
            }

            // 建立 24 小時的圖表
            let chartHTML = '';
            for (let h = 0; h < 24; h++) {
                const hourData = data.hourlyStats.find(s => s.hour === h);

                if (hourData) {
                    let className = 'hour-block';
                    if (h === data.bestHour) className += ' best';
                    if (h === data.worstHour) className += ' worst';

                    chartHTML += `
                        <div class="${className}">
                            <div class="hour-label">${h}:00</div>
                            <div class="accuracy">${hourData.accuracy}%</div>
                            <div class="count">${hourData.correct}/${hourData.total}</div>
                        </div>
                    `;
                } else {
                    chartHTML += `
                        <div class="hour-block" style="opacity: 0.3;">
                            <div class="hour-label">${h}:00</div>
                            <div class="accuracy">-</div>
                            <div class="count">0/0</div>
                        </div>
                    `;
                }
            }

            hourlyChart.innerHTML = chartHTML;
        }

        // 測試當前用戶
        window.testCurrentUser = async function() {
            updateStatus('正在測試當前用戶...', 'loading');

            try {
                const { data: { user } } = await apiService.supabase.auth.getUser();

                if (!user) {
                    updateStatus('錯誤：未登入', 'error');
                    alert('請先登入系統！');
                    return;
                }

                const result = await apiService.getHourlyEfficiency(user.id);

                if (result.success) {
                    updateStatus(`✅ 測試成功！找到 ${result.data.hourlyStats.length} 個時段的數據`, 'success');
                    showRawData(result);
                    showSummary(result.data);
                    showChart(result.data);

                    // 自動勾選測試項目
                    if (result.data.hourlyStats.length > 0) {
                        document.getElementById('test2').checked = true;
                        document.getElementById('test4').checked = true;
                    }
                    if (result.data.recommendation) {
                        document.getElementById('test5').checked = true;
                    }
                } else {
                    updateStatus(`❌ 測試失敗：${result.error}`, 'error');
                    showRawData(result);
                }
            } catch (error) {
                updateStatus(`❌ 測試失敗：${error.message}`, 'error');
                console.error(error);
            }
        };

        // 測試新用戶（無數據）
        window.testNewUser = async function() {
            updateStatus('正在測試新用戶（無數據）...', 'loading');

            // 使用一個不存在的 UUID
            const fakeUserId = '00000000-0000-0000-0000-000000000000';

            try {
                const result = await apiService.getHourlyEfficiency(fakeUserId);

                if (result.success && result.data.hourlyStats.length === 0) {
                    updateStatus('✅ 新用戶測試成功！正確回傳空數據', 'success');
                    showRawData(result);
                    document.getElementById('test3').checked = true;
                } else {
                    updateStatus('⚠️ 新用戶測試：回傳非預期結果', 'error');
                    showRawData(result);
                }
            } catch (error) {
                updateStatus(`❌ 測試失敗：${error.message}`, 'error');
                console.error(error);
            }
        };

        // 測試自訂用戶
        window.testCustomUser = async function() {
            const userId = document.getElementById('customUserId').value.trim();

            if (!userId) {
                alert('請輸入用戶 ID！');
                return;
            }

            updateStatus(`正在測試用戶 ${userId.substring(0, 8)}...`, 'loading');

            try {
                const result = await apiService.getHourlyEfficiency(userId);

                if (result.success) {
                    updateStatus(`✅ 測試成功！找到 ${result.data.hourlyStats.length} 個時段的數據`, 'success');
                    showRawData(result);
                    showSummary(result.data);
                    showChart(result.data);
                } else {
                    updateStatus(`❌ 測試失敗：${result.error}`, 'error');
                    showRawData(result);
                }
            } catch (error) {
                updateStatus(`❌ 測試失敗：${error.message}`, 'error');
                console.error(error);
            }
        };

        // 初始化
        console.log('T005 測試頁面已載入');
        console.log('ApiService:', apiService);
    </script>
</body>
</html>
